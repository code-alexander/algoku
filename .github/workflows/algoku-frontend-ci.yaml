name: Validate algoku-frontend

on:
  workflow_call:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./projects/algoku-frontend/package-lock.json"

      - name: Install dependencies
        working-directory: ./projects/algoku-frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('projects/algoku-frontend/package-lock.json') }}

      - name: Install Playwright browsers and dependencies
        working-directory: ./projects/algoku-frontend
        run: npx playwright install --with-deps

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Run CI
        run: just ci
